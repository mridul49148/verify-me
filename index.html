<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Me</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container main">
    <header class="mb-1">
      <div class="green-dot mt-1">
      </div>
      <div class="head">
        Verify Me
    </header>

    <div class="sub mb-1 ">
      Open you account -- it takes only 3 minutes
    </div>

    <div class="container form">
      <div class="steps">
        <div class="step step-1">1.INDENTITY</div>
        <div class="step">2.ADDRESS & INCOME</div>
        <div class="step">1.DOCUMENTS</div>
      </div>
      <div class="progress mt-1 mb-3 ">
        <div class="progress-fill">
        </div>

      </div>
      <form class="mb-3">
        <input type="text" class="form-control  " placeholder="Full leagal name">
        <input type="email" class="form-control " placeholder="Email address">
        <div class="label ps-1">
          Mobile number
        </div>
        <div class="input-group">

          <span class="input-group-text num">
            +91
          </span>

          <input type="tel" class="form-control" placeholder="10-digit mobile">

        </div>
        <div class="label ps-1">
          PAN
        </div>
        <div class="input-group">
          <span class="input-group-text num">
              🪪
          </span>
          <input type="text" class="form-control" placeholder="ABCD1234F">
        </div>
        <div class="button">
          <button class="btn b-b">Back</button>
          <button class="btn  b-c">Continue</button>
        </div>

      </form>
    </div>


  </div>
</body>

</html>
